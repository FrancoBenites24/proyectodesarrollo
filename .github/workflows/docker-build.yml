name: Docker Build

# Deshabilitado temporalmente hasta que el Dockerfile esté listo (Issue #6)
# Se reactivará automáticamente cuando se mergee el PR del Issue #6

on:
  # Solo ejecución manual por el momento
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón para ejecutar manualmente'
        required: false
        default: 'Manual trigger'

  # Se reactivará este trigger cuando el Dockerfile esté listo
  # push:
  #   branches: [main]
  #   paths:
  #     - 'Dockerfile'

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "ERROR: Dockerfile not found. Complete Issue #6 first."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        id: lower
        run: echo "repo=$(echo '${{ github.repository }}' | tr [:upper:] [:lower:])" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/${{ steps.lower.outputs.repo }}:latest
            ghcr.io/${{ steps.lower.outputs.repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max